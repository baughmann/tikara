name: 🔐 Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  safety:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          args: --save-as html safety_scan.html

      - name: Upload safety report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety_scan.html

      - name: Commit safety report
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update safety vulnerability report"
          file_pattern: safety_scan.html
          commit_user_name: Tikara Security Bot
